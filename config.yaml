# ================================================
# 小红书舆论监控 - 配置文件
# 修改此文件适配你的品牌和行业
# ================================================

# 你的品牌
brand:
  name: "你的品牌名"
  products:
    - "产品1"
    - "产品2"

# 搜索关键词（建议 3-5 个，每周根据热搜调整）
keywords:
  - "品牌名"
  - "行业词 对比"
  - "行业词 测评"
  - "行业词 排名"

# 搜索设置
search:
  time_filter: "一天内"
  sort_by: "最多点赞"
  scroll_times: 5

# 飞书多维表格
feishu:
  app_token: ""
  table_id: ""

# 竞品列表
competitors:
  - "竞品1"
  - "竞品2"
  - "竞品3"

# ================================================
# 评论人设（3个）
# 原则：选你的目标用户群里最有说服力的 3 种人
#
# 示例（按行业）：
#   AI/科技：技术专家 / 普通用户 / 产品经理
#   美妆：资深化妆师 / 学生党 / 成分党博主
#   餐饮：美食博主 / 附近居民 / 餐饮同行
#   电商：老买家 / 新买家 / 行业从业者
#   教育：在读学员 / 家长 / 教育行业人士
# ================================================
personas:
  - name: "人设1名称"
    traits: "这个人是谁，什么背景"
    style: "怎么说话（口语化/专业/情绪化）"
    purpose: "为什么用这个人设评论"

  - name: "人设2名称"
    traits: "这个人是谁，什么背景"
    style: "怎么说话"
    purpose: "为什么用这个人设评论"

  - name: "人设3名称"
    traits: "这个人是谁，什么背景"
    style: "怎么说话"
    purpose: "为什么用这个人设评论"

# ================================================
# 可引用数据（可选）
# 如果你的产品有第三方评测数据，填在这里
# Agent 生成评论时会引用这些数据
# ================================================
reference_data: []
  # 示例：
  # - dimension: "好评率"
  #   source: "大众点评"
  #   value: "4.8分"
  # - dimension: "销量排名"
  #   source: "天猫"
  #   value: "品类第3"
