# 小红书舆论监控 - 配置文件
# 复制此文件，填入你自己的品牌信息即可使用

# ========== 品牌信息（必填）==========
brand:
  name: ""              # 你的品牌名，如 "MiniMax"、"完美日记"、"瑞幸"
  products: []           # 你的产品列表，如 ["海螺AI", "M2.7"]

# ========== 搜索关键词（必填）==========
keywords: []
  # 填入要监控的关键词，建议 3-5 个，如：
  # - "品牌名"
  # - "行业+对比"
  # - "行业+测评"
  # - "行业+推荐"

# ========== 搜索设置 ==========
search:
  time_filter: "一天内"   # 时间范围：一天内 / 一周内 / 一月内
  sort_by: "最多点赞"     # 排序：最多点赞 / 最新
  scroll_times: 5         # 滚动翻页次数，越大抓取越多

# ========== 紧急程度设置 ==========
urgency:
  distribution: [0.34, 0.33, 0.33]  # 高/中/低比例
  threat_weight: 0.6                 # 威胁度权重（0-1）
  spread_weight: 0.4                 # 传播力权重（0-1）
  watchlist: []                      # 重点关注的作者昵称列表

# ========== 飞书多维表格（必填）==========
feishu:
  app_token: ""          # 飞书多维表格 app_token
  table_id: ""           # 数据表 table_id

# ========== 竞品列表 ==========
competitors: []
  # 填入竞品名称，用于识别对比帖，如：
  # - "竞品A"
  # - "竞品B"

# ========== 评论人设（必填，3个）==========
# 选你的目标用户中最有说服力的 3 种人
# 每个人设需要定义：name（名称）、traits（特征）、style（说话风格）、purpose（目的）

personas:
  - name: ""             # 如 "🧑‍💻 行业专家"
    traits: ""           # 如 "10年经验，懂技术"
    style: ""            # 如 "引用数据，理性权威"
    purpose: ""          # 如 "用数据定调"

  - name: ""             # 如 "🌱 普通用户"
    traits: ""           # 如 "刚接触，好奇心强"
    style: ""            # 如 "口语化、短、提问式"
    purpose: ""          # 如 "降低广告感"

  - name: ""             # 如 "📊 从业者"
    traits: ""           # 如 "5年行业经验"
    style: ""            # 如 "分析对比、讲逻辑"
    purpose: ""          # 如 "影响专业决策者"

# ========== 参考数据（可选）==========
# 评论中可引用的真实数据，增强可信度
reference_data: []
  # 格式：
  # - dimension: "某指标"
  #   source: "数据来源"
  #   value: "具体数值"
